name: ESP-FC Build & Release

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]
  release:
    types: [ published ]

env:
  PLATFORMIO_VERSION: '6'

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run Unit Tests
        run: pio test -e native

  build:
    needs: test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: esp32
            merge: true
            uf2: false
          - name: esp32s2
            merge: true
            uf2: false
          - name: esp32s3
            merge: true
            uf2: false
          - name: esp32c3
            merge: true
            uf2: false
          - name: esp8266
            merge: false
            uf2: false
          - name: rp2040
            merge: false
            uf2: true
          - name: rp2350
            merge: false
            uf2: true

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Extract Version
        id: version
        run: |
          REV=$(echo ${GITHUB_SHA} | cut -c1-7)
          if [[ $GITHUB_EVENT_NAME == "pull_request" ]]; then
            VER="pr${{ github.event.pull_request.number }}"
            NAME="espfc_${VER}_${{ matrix.target.name }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
            NAME="espfc_${VER}_${{ matrix.target.name }}"
          else
            VER="0.0.0"
            NAME="espfc_${REV}_${{ matrix.target.name }}"
          fi
          echo "VERSION=${VER}" >> $GITHUB_ENV
          echo "REVISION=${REV}" >> $GITHUB_ENV
          echo "FILENAME=${NAME}" >> $GITHUB_ENV

      - name: Build ${{ matrix.target.name }}
        run: |
          pio run -e ${{ matrix.target.name }}
          mv .pio/build/${{ matrix.target.name }}/firmware.bin .pio/build/${{ env.FILENAME }}.bin

      - name: Upload Firmware Binary
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target.name }}
          path: .pio/build/${{ env.FILENAME }}.bin

      - name: Prepare Merged Binary
        if: ${{ matrix.target.merge == true }}
        run: |
          mv .pio/build/${{ matrix.target.name }}/firmware_0x00.bin .pio/build/${{ env.FILENAME }}_0x00.bin || true
        continue-on-error: true

      - name: Upload Merged Artifact
        if: ${{ matrix.target.merge == true }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-merged-${{ matrix.target.name }}
          path: .pio/build/${{ env.FILENAME }}_0x00.bin

      - name: Prepare UF2 Image
        if: ${{ matrix.target.uf2 == true }}
        run: |
          mv .pio/build/${{ matrix.target.name }}/firmware.uf2 .pio/build/${{ env.FILENAME }}.uf2 || true
        continue-on-error: true

      - name: Upload UF2 Artifact
        if: ${{ matrix.target.uf2 == true }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2-${{ matrix.target.name }}
          path: .pio/build/${{ env.FILENAME }}.uf2

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
          files: |
            artifacts/firmware-*/espfc_*.bin
            artifacts/firmware-merged-*/espfc_*_0x00.bin
            artifacts/firmware-uf2-*/espfc_*.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: ESP-FC Build

on:
  push:
    branches: [ '*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ '*' ]

env:
  PLATFORMIO_VERSION: '6'

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run Unit Tests
        run: pio test -e native

  build:
    needs: test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: esp32
            merge: true
            uf2: false
          - name: esp32s2
            merge: true
            uf2: false
          - name: esp32s3
            merge: true
            uf2: false
          - name: esp32c3
            merge: true
            uf2: false
          - name: esp8266
            merge: false
            uf2: false
          - name: rp2040
            merge: false
            uf2: true
          - name: rp2350
            merge: false
            uf2: true

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Extract Version
        id: version
        run: |
          REV=$(echo ${GITHUB_SHA} | cut -c1-7)
          if [[ $GITHUB_EVENT_NAME == "pull_request" ]]; then
            VER="pr${{ github.event.pull_request.number }}"
            NAME="espfc_${VER}_${{ matrix.target.name }}"
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
            NAME="espfc_${VER}_${{ matrix.target.name }}"
          else
            VER="0.0.0"
            NAME="espfc_${REV}_${{ matrix.target.name }}"
          fi
          echo "VERSION=${VER}" >> $GITHUB_ENV
          echo "REVISION=${REV}" >> $GITHUB_ENV
          echo "FILENAME=${NAME}" >> $GITHUB_ENV
          echo "build_ver=${VER}" >> $GITHUB_OUTPUT
          echo "build_rev=${REV}" >> $GITHUB_OUTPUT
          echo "build_name=${NAME}" >> $GITHUB_OUTPUT

      - name: Build ${{ matrix.target.name }}
        run: |
          pio run -e ${{ matrix.target.name }}
          mv .pio/build/${{ matrix.target.name }}/firmware.bin .pio/build/${{ env.FILENAME }}.bin

      - name: Upload Firmware Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}.bin
          path: .pio/build/${{ env.FILENAME }}.bin

      - name: Upload Merged Binary
        if: ${{ matrix.target.merge == true }}
        run: |
          mv .pio/build/${{ matrix.target.name }}/firmware_0x00.bin .pio/build/${{ env.FILENAME }}_0x00.bin
        continue-on-error: true

      - name: Upload Merged Artifact
        if: ${{ matrix.target.merge == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}_0x00.bin
          path: .pio/build/${{ env.FILENAME }}_0x00.bin

      - name: Upload UF2 Image
        if: ${{ matrix.target.uf2 == true }}
        run: |
          mv .pio/build/${{ matrix.target.name }}/firmware.uf2 .pio/build/${{ env.FILENAME }}.uf2
        continue-on-error: true

      - name: Upload UF2 Artifact
        if: ${{ matrix.target.uf2 == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}.uf2
          path: .pio/build/${{ env.FILENAME }}.uf2

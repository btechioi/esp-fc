; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32, esp32s2, esp32s3, esp32c3, esp8266, rp2040, rp2350

[env]
build_flags = 
	-std=gnu++17
	-Wall
build_unflags = 
	-std=gnu++11
	-ggdb
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
	yoursunny/WifiEspNow @ ^0.0.20230713
	https://github.com/rtlopez/espnow-rclink/archive/refs/tags/v0.1.1.zip

[env:esp32]
board = lolin32
platform = espressif32
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = partitions_4M_nota.csv
lib_deps = 
	${env.lib_deps}
build_unflags = 
	${env.build_unflags}
build_flags = 
	${env.build_flags}
extra_scripts = merge_firmware.py

[env:esp32s3]
board = lolin_s3_mini
platform = espressif32
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = partitions_4M_nota.csv
lib_deps = 
	${env.lib_deps}
build_unflags = 
	${env.build_unflags}
	-DBOARD_HAS_PSRAM
build_flags = 
	${env.build_flags}
	-DESP32S3
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
extra_scripts = merge_firmware.py
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes

[env:esp32s2]
board = esp32-s2-saola-1
platform = espressif32
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = partitions_4M_nota.csv
lib_deps = 
	${env.lib_deps}
build_unflags = 
	${env.build_unflags}
build_flags = 
	${env.build_flags}
	-DESP32S2
	-DARDUINO_USB_MODE=0
	-DARDUINO_USB_CDC_ON_BOOT=1
extra_scripts = merge_firmware.py
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
board_upload.require_upload_port = yes

[env:esp32c3]
board = esp32-c3-devkitm-1
platform = espressif32
framework = arduino
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
lib_deps = 
	${env.lib_deps}
build_unflags = 
	${env.build_unflags}
build_flags = 
	${env.build_flags}
	-DESP32C3
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
extra_scripts = merge_firmware.py

[env:esp8266]
board = d1_mini
platform = espressif8266
framework = arduino
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.ldscript = eagle.flash.4m3m.ld
lib_deps = 
	${env.lib_deps}
build_unflags = 
	${env.build_unflags}
build_flags = 
	${env.build_flags}

[env:rp2040]
board = pico
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
lib_deps = teamprof/ArduCMSIS-DSP@^1.0.0
build_unflags = 
	${env.build_unflags}
build_flags = 
	${env.build_flags}
	-DARCH_RP2040
	-DUSE_CMSIS_DSP
	-DARM_MATH_CM0PLUS
	-DIRAM_ATTR=""

[env:rp2350]
board = rpipico2
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
lib_deps = teamprof/ArduCMSIS-DSP@^1.0.0
build_unflags = 
	${env.build_unflags}
build_flags = 
	${env.build_flags}
	-DARCH_RP2040
	-DARCH_RP2350
	-DUSE_CMSIS_DSP
	-DARM_MATH_CM0PLUS
	-DIRAM_ATTR=""

[env:native]
platform = native
lib_deps = 
	fabiobatsilva/ArduinoFake@^0.4.0
	throwtheswitch/Unity@^2.6.0
build_unflags = 
	-std=gnu++11
build_flags = 
	-DIRAM_ATTR=""
	-DUNIT_TEST
	-std=c++17
	-DNO_GLOBAL_INSTANCES
